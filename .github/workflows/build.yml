name: APK Yapici
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sistem Gereksinimlerini Kur
        run: |
          sudo apt update
          # libtinfo5 yerine libtinfo6 ekledik ve gereksizleri ayıkladık efendim:
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade Cython==0.29.33 buildozer

      - name: Buildozer ile APK Üret
        run: |
          # Bu komut tüm lisansları otomatik onaylar ve üretimi başlatır
          yes | buildozer -v android debug
          
      - name: APK Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-APK
          path: bin/*.apk
          
