name: APK Yapici
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Java Kurulumu (En Garanti Sürüm)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Python ve Sistem Gereksinimleri
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade Cython==0.29.33 buildozer

      - name: APK Uretimi
        run: |
          # Önce her şeyi bir temizleyelim, kalıntı kalmasın
          buildozer android clean
          # Şimdi her soruya 'evet' diyerek üretelim
          yes | buildozer android debug
          
      - name: APK Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-APK
          path: bin/*.apk
          
