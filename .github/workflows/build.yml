name: APK Yapici
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Sistem ve Python Hazirligi
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade Cython==0.29.33 buildozer

      - name: APK Uretimi (Lisans Onayli)
        run: |
          # Bu komut fabrikadaki tüm sorulara otomatik 'evet' der
          yes | buildozer android debug
          
      - name: APK Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-APK
          path: bin/*.apk
